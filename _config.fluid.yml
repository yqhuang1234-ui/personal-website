#---------------------------
# Hexo Theme Fluid — Site config override
# Yanqi Huang · personal-website
# Docs: https://hexo.fluid-dev.com/docs/en/guide/
#---------------------------


#---------------------------
# Global
#---------------------------

favicon: /img/fluid.png
apple_touch_icon: /img/fluid.png
tab_title_separator: " - "
force_https: false

# Code blocks
code:
  copy_btn: true
  language:
    enable: true
    default: "TEXT"
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "github"        # clean light style matching academic look
      style_dark: "github-dark"

# Fun features
fun_features:
  typing:
    enable: true
    typeSpeed: 60
    cursorChar: "|"
    loop: false
    scope: [home]            # typing effect only on home banner
  anchorjs:
    enable: true
    element: h1,h2,h3,h4,h5,h6
    placement: left
    visible: hover
    icon: ""
  progressbar:
    enable: true
    height_px: 2
    color: "#2a5298"
    options: { showSpinner: false, trickleSpeed: 100 }

# Dark mode
dark_mode:
  enable: true
  default: light             # default to light; reader can toggle

# Color scheme — clean, academic, minimal
color:
  body_bg_color: "#f2f3f5"
  body_bg_color_dark: "#181c27"

  navbar_bg_color: "#2c3e50"       # dark slate — professional
  navbar_bg_color_dark: "#1a2535"

  navbar_text_color: "#f0f0f0"
  navbar_text_color_dark: "#d0d0d0"

  subtitle_color: "#ffffff"
  subtitle_color_dark: "#d0d0d0"

  text_color: "#2c3e50"
  text_color_dark: "#c4c6c9"

  sec_text_color: "#5a6a7a"
  sec_text_color_dark: "#a7a9ad"

  board_color: "#ffffff"
  board_color_dark: "#252d38"

  post_text_color: "#2c3e50"
  post_text_color_dark: "#c4c6c9"

  post_heading_color: "#1a202c"
  post_heading_color_dark: "#d0d0d0"

  post_link_color: "#2a5298"
  post_link_color_dark: "#5b8ef0"

  link_hover_color: "#1e3f80"
  link_hover_color_dark: "#7aaef5"

  link_hover_bg_color: "#eef2fa"
  link_hover_bg_color_dark: "#364151"

  line_color: "#e0e4ea"
  line_color_dark: "#435266"

  scrollbar_color: "#c4c6c9"
  scrollbar_color_dark: "#687582"
  scrollbar_hover_color: "#9da8b3"
  scrollbar_hover_color_dark: "#9da8b3"

  button_bg_color: "transparent"
  button_bg_color_dark: "transparent"
  button_hover_bg_color: "#eef2fa"
  button_hover_bg_color_dark: "#46647e"

# Typography
font:
  font_size: 16px
  font_family: "'Inter', 'Helvetica Neue', Arial, sans-serif"
  letter_spacing: 0.01em
  code_font_size: 85%

# Icon library
iconfont: //at.alicdn.com/t/c/font_1736178_k526ubmyhba.css


#---------------------------
# Navigation bar
#---------------------------
navbar:
  blog_title: "Yanqi Huang"
  ground_glass:
    enable: false
  menu:
    - { key: "Home",     name: "Home",     link: "/",          icon: "iconfont icon-home-fill" }
    - { key: "About",    name: "About",    link: "/about/",    icon: "iconfont icon-user-fill" }
    - { key: "Projects", name: "Projects", link: "/projects/", icon: "iconfont icon-categories" }
    - { key: "Blog",     name: "Blog",     link: "/blog/",     icon: "iconfont icon-archive-fill" }
    - { key: "CV",       name: "CV",       link: "/cv/",       icon: "iconfont icon-download" }

# Search
search:
  enable: true
  path: /local-search.xml
  generate_path: /local-search.xml
  field: post
  content: true

# Banner
banner:
  random_img: false
  parallax: true
  width_height_ratio: 1.0

scroll_down_arrow:
  enable: true
  banner_height_limit: 80
  scroll_after_turning_page: true

scroll_top_arrow:
  enable: true

open_graph:
  enable: true
  twitter_card: summary_large_image


#---------------------------
# Footer
#---------------------------
footer:
  content: '
    <span>Yanqi Huang</span>
    &nbsp;·&nbsp;
    <a href="mailto:yqhuang1234@gmail.com">yqhuang1234@gmail.com</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/yqhuang1234-ui" target="_blank" rel="noopener">GitHub</a>
    &nbsp;·&nbsp;
    <a href="https://hexo.io" target="_blank" rel="nofollow noopener">Hexo</a>
    +
    <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener">Fluid</a>
  '
  statistics:
    enable: false


#---------------------------
# Home Page
#---------------------------
index:
  banner_img: /img/default.png
  banner_img_height: 90
  banner_mask_alpha: 0.45
  slogan:
    enable: true
    text:
      - "Keep showing up."
      - "Machine Learning · Deep Learning · Methods for Biomedicine."
      - "Also: Watercolor. Crochet. Half marathons."
  auto_excerpt:
    enable: true
  post_url_target: _self
  post_meta:
    date: true
    category: true
    tag: true


#---------------------------
# Post Page
#---------------------------
post:
  banner_img: /img/default.png
  banner_img_height: 55
  banner_mask_alpha: 0.4
  meta:
    author:
      enable: true
    date:
      enable: true
      format: "MMMM D, YYYY"
    wordcount:
      enable: true
    min2read:
      enable: true
      awl: 5
      wpm: 200
    views:
      enable: false
  updated:
    enable: false
  toc:
    enable: true
    expand_all: false
    placement: right
    headingSelector: "h1,h2,h3,h4"
    collapseDepth: 0
  copyright:
    enable: true
    license: 'BY'
    author:
      enable: true
    post_date:
      enable: true
      format: "LL"
    update_date:
      enable: false
  prev_next:
    enable: true
  image_caption:
    enable: true
  image_zoom:
    enable: true
  footnote:
    enable: true
    header: '<h2>References</h2>'

  # Math — MathJax enabled
  math:
    enable: true
    specific: true
    engine: mathjax

  mermaid:
    enable: false
    specific: false
    options: { theme: 'default' }

  comments:
    enable: false
    type: disqus


#---------------------------
# Archive Page
#---------------------------
archive:
  banner_img: /img/default.png
  banner_img_height: 50
  banner_mask_alpha: 0.4


#---------------------------
# About Page
#---------------------------
about:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 50
  banner_mask_alpha: 0.4
  avatar: /img/avatar.png
  name: "Yanqi Huang"
  intro: "MS Biostatistics · PhD Applicant · Ex-Data Scientist · ML/DL"
  icons:
    - { class: "iconfont icon-github-fill",  link: "https://github.com/yqhuang1234-ui", tip: "GitHub" }
    - { class: "iconfont icon-mail-fill",    link: "mailto:yqhuang1234@gmail.com",      tip: "Email" }


#---------------------------
# Custom Pages (Projects, CV)
#---------------------------
page:
  banner_img: /img/default.png
  banner_img_height: 50
  banner_mask_alpha: 0.4


#---------------------------
# 404 Page
#---------------------------
page404:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 85
  banner_mask_alpha: 0.4
  redirect_delay: 5000


#---------------------------
# Lazyload
#---------------------------
lazyload:
  enable: true
  loading_img: /img/loading.gif
  onlypost: false
  offset_factor: 2
