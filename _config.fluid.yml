#---------------------------
# Hexo Theme Fluid — Site config override
# Yanqi Huang · personal-website
# Docs: https://hexo.fluid-dev.com/docs/en/guide/
#---------------------------


#---------------------------
# Global
#---------------------------

favicon: /img/fluid.png
apple_touch_icon: /img/fluid.png
tab_title_separator: " - "
force_https: false

# Code blocks
code:
  copy_btn: true
  language:
    enable: true
    default: "TEXT"
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "github"        # clean light style matching academic look
      style_dark: "github-dark"

# Fun features
fun_features:
  typing:
    enable: true
    typeSpeed: 60
    cursorChar: "|"
    loop: false
    scope: [home]            # typing effect only on home banner
  anchorjs:
    enable: true
    element: h1,h2,h3,h4,h5,h6
    placement: left
    visible: hover
    icon: ""
  progressbar:
    enable: true
    height_px: 2
    color: "#CC785C"
    options: { showSpinner: false, trickleSpeed: 100 }

# Dark mode
dark_mode:
  enable: false
  default: light             # fixed light mode; no reader toggle

# Color scheme — Anthropic × Notion inspired
color:
  body_bg_color: "#F7F2EA"           # rich warm cream (Anthropic)
  body_bg_color_dark: "#191919"      # near-black (Notion)

  navbar_bg_color: "#1A1A1A"         # true dark
  navbar_bg_color_dark: "#111111"

  navbar_text_color: "#F0EBE1"       # warm off-white
  navbar_text_color_dark: "#E8E4DC"

  subtitle_color: "#F0EBE1"
  subtitle_color_dark: "#E8E4DC"

  text_color: "#1A1A1A"              # near-black (Notion)
  text_color_dark: "#E8E4DC"         # warm off-white

  sec_text_color: "#5F5F5F"
  sec_text_color_dark: "#9B9288"

  board_color: "#FFFFFF"
  board_color_dark: "#242424"

  post_text_color: "#1A1A1A"
  post_text_color_dark: "#E8E4DC"

  post_heading_color: "#1A1A1A"
  post_heading_color_dark: "#F0EBE1"

  post_link_color: "#CC785C"         # Anthropic terracotta
  post_link_color_dark: "#E8917A"    # lighter terracotta

  link_hover_color: "#A85C42"
  link_hover_color_dark: "#F0A890"

  link_hover_bg_color: "#F5EDE6"     # warm tint
  link_hover_bg_color_dark: "#2E2420"

  line_color: "#E8E2D9"              # warm gray border
  line_color_dark: "#363636"

  scrollbar_color: "#C8BFB5"
  scrollbar_color_dark: "#555555"
  scrollbar_hover_color: "#A89F95"
  scrollbar_hover_color_dark: "#777777"

  button_bg_color: "transparent"
  button_bg_color_dark: "transparent"
  button_hover_bg_color: "#F5EDE6"
  button_hover_bg_color_dark: "#2E2420"

# Typography
font:
  font_size: 16px
  font_family: "'Inter', 'Helvetica Neue', Arial, sans-serif"
  letter_spacing: 0.01em
  code_font_size: 85%

# Icon library
iconfont: //at.alicdn.com/t/c/font_1736178_k526ubmyhba.css

# Custom CSS (loaded after theme CSS)
custom_css: /css/custom.css


#---------------------------
# Navigation bar
#---------------------------
navbar:
  blog_title: "Yanqi Huang"
  ground_glass:
    enable: false
  menu:
    - { key: "Home",     name: "Home",     link: "/",          icon: "iconfont icon-home-fill" }
    - { key: "About",    name: "About",    link: "/about/",    icon: "iconfont icon-user-fill" }
    - { key: "Projects", name: "Projects", link: "/projects/", icon: "iconfont icon-briefcase" }
    - { key: "Blog",     name: "Blog",     link: "/blog/",     icon: "iconfont icon-archive-fill" }
    - { key: "CV",       name: "CV",       link: "/cv/",       icon: "iconfont icon-cliplist" }

# Search
search:
  enable: true
  path: /local-search.xml
  generate_path: /local-search.xml
  field: post
  content: true

# Banner
banner:
  random_img: false
  parallax: true
  width_height_ratio: 1.0

scroll_down_arrow:
  enable: true
  banner_height_limit: 80
  scroll_after_turning_page: true

scroll_top_arrow:
  enable: true

open_graph:
  enable: true
  twitter_card: summary_large_image


#---------------------------
# Footer
#---------------------------
footer:
  content: '
    <span>Yanqi Huang</span>
    &nbsp;·&nbsp;
    <a href="mailto:yqhuang1234@gmail.com">yqhuang1234@gmail.com</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/yqhuang1234-ui" target="_blank" rel="noopener">GitHub</a>
    &nbsp;·&nbsp;
    <a href="https://hexo.io" target="_blank" rel="nofollow noopener">Hexo</a>
    +
    <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener">Fluid</a>
  '
  statistics:
    enable: false


#---------------------------
# Home Page
#---------------------------
index:
  banner_img: /img/default.png
  banner_img_height: 90
  banner_mask_alpha: 0.45
  slogan:
    enable: true
    text:
      - "I live in the overlap between data and creativity, logic and art, work and play. Always learning, always making, always moving."
  auto_excerpt:
    enable: true
  post_url_target: _self
  post_meta:
    date: true
    category: true
    tag: true


#---------------------------
# Post Page
#---------------------------
post:
  banner_img: /img/default.png
  banner_img_height: 55
  banner_mask_alpha: 0.4
  meta:
    author:
      enable: true
    date:
      enable: true
      format: "MMMM D, YYYY"
    wordcount:
      enable: true
    min2read:
      enable: true
      awl: 5
      wpm: 200
    views:
      enable: false
  updated:
    enable: false
  toc:
    enable: true
    expand_all: false
    placement: right
    headingSelector: "h1,h2,h3,h4"
    collapseDepth: 0
  copyright:
    enable: true
    license: 'BY'
    author:
      enable: true
    post_date:
      enable: true
      format: "LL"
    update_date:
      enable: false
  prev_next:
    enable: true
  image_caption:
    enable: true
  image_zoom:
    enable: true
  footnote:
    enable: true
    header: '<h2>References</h2>'

  # Math — MathJax enabled
  math:
    enable: true
    specific: true
    engine: mathjax

  mermaid:
    enable: false
    specific: false
    options: { theme: 'default' }

  comments:
    enable: true
    type: utterances


#---------------------------
# Archive Page
#---------------------------
archive:
  banner_img: /img/default.png
  banner_img_height: 50
  banner_mask_alpha: 0.4


#---------------------------
# About Page
#---------------------------
about:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 50
  banner_mask_alpha: 0.4
  avatar: /img/avatar.png
  name: "Yanqi Huang"
  intro: "MS Biostatistics · PhD Applicant · Ex-Data Scientist · ML/DL"
  icons:
    - { class: "iconfont icon-github-fill",  link: "https://github.com/yqhuang1234-ui", tip: "GitHub" }
    - { class: "iconfont icon-mail-fill",    link: "mailto:yqhuang1234@gmail.com",      tip: "Email" }


#---------------------------
# Custom Pages (Projects, CV)
#---------------------------
page:
  banner_img: /img/default.png
  banner_img_height: 50
  banner_mask_alpha: 0.4


#---------------------------
# 404 Page
#---------------------------
page404:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 85
  banner_mask_alpha: 0.4
  redirect_delay: 5000


#---------------------------
# Utterances Comments
#---------------------------
utterances:
  repo: yqhuang1234-ui/yqhuang1234-ui.github.io
  issue_term: pathname
  label: utterances
  theme: github-light
  theme_dark: github-dark

#---------------------------
# Lazyload
#---------------------------
lazyload:
  enable: true
  loading_img: /img/loading.gif
  onlypost: false
  offset_factor: 2


