<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F2EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EDE8DF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)" rx="0"/>

  <!-- Notion-style page card -->
  <rect x="60" y="44" width="680" height="332" rx="10" fill="#ffffff" filter="url(#shadow)"/>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Top bar dots (browser / notion chrome feel) -->
  <circle cx="96" cy="74" r="5" fill="#E8E2D9"/>
  <circle cx="114" cy="74" r="5" fill="#E8E2D9"/>
  <circle cx="132" cy="74" r="5" fill="#E8E2D9"/>

  <!-- Divider under top bar -->
  <line x1="60" y1="90" x2="740" y2="90" stroke="#F0EBE4" stroke-width="1"/>

  <!-- Notion emoji / icon -->
  <text x="96" y="148" font-family="serif" font-size="36">🧠</text>

  <!-- Title -->
  <text x="148" y="138" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">Course 1 · Neural Networks and Deep Learning</text>
  <text x="148" y="162" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#9B9288">Deep Learning Specialization — Andrew Ng · Coursera</text>

  <!-- Divider -->
  <line x1="96" y1="184" x2="704" y2="184" stroke="#F0EBE4" stroke-width="1"/>

  <!-- Week rows -->
  <!-- Week 2 -->
  <rect x="96" y="198" width="4" height="36" rx="2" fill="#CC785C"/>
  <text x="112" y="214" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Week 2</text>
  <text x="112" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F5F5F">Basics of Neural Network Programming</text>

  <!-- Week 3 -->
  <rect x="96" y="248" width="4" height="36" rx="2" fill="#CC785C"/>
  <text x="112" y="264" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Week 3</text>
  <text x="112" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F5F5F">Shallow Neural Networks</text>

  <!-- Week 4 -->
  <rect x="96" y="298" width="4" height="36" rx="2" fill="#CC785C"/>
  <text x="112" y="314" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Week 4</text>
  <text x="112" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F5F5F">Deep Neural Networks</text>

  <!-- Bottom label -->
  <text x="96" y="362" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#C8BFB5">Personal study notes · Notion</text>
</svg>
