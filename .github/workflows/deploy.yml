# ============================================================
# GitHub Actions — Auto-deploy Hexo site to GitHub Pages
#
# What this does:
#   Every time you push to the `main` branch, GitHub runs this
#   workflow automatically. It builds your Hexo site and pushes
#   the generated HTML to a separate `gh-pages` branch, which
#   GitHub Pages then serves as your live website.
#
# You never need to run `hexo deploy` manually.
# ============================================================

name: Deploy Hexo to GitHub Pages

# Trigger: run this workflow on every push to main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest  # GitHub provides a free Linux server to run this

    steps:
      # Step 1 — Check out your source code onto the server
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: false   # not using git submodules for the theme

      # Step 2 — Install the exact Node.js version that matches your local setup
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'        # caches node_modules between runs → faster builds

      # Step 3 — Install Hexo and all plugins listed in package.json
      - name: Install dependencies
        run: npm ci            # `npm ci` is like `npm install` but stricter/faster in CI

      # Step 4 — Build the static site into the `public/` folder
      - name: Build site
        run: npx hexo generate

      # Step 5 — Push the contents of `public/` to the `gh-pages` branch.
      #           GitHub Pages will serve this branch as your live site.
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # auto-provided by GitHub, no setup needed
          publish_dir: ./public                       # the folder Hexo builds into
          publish_branch: gh-pages
          commit_message: "Deploy: ${{ github.event.head_commit.message }}"
          force_orphan: true   # keeps gh-pages history clean (only latest build)
